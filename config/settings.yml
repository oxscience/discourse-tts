plugins:
  tts_enabled:
    default: false
    client: true
    description: "Enable text-to-speech audio generation for posts"

  tts_provider:
    default: "google"
    type: list
    choices:
      - google
      - openai
    client: false
    description: "TTS provider: Google Cloud TTS or OpenAI"

  tts_api_key:
    default: ""
    secret: true
    description: "API key for the selected TTS provider"

  # --- Google Cloud TTS settings ---

  tts_google_voice:
    default: "de-DE-Studio-B"
    type: list
    choices:
      - de-DE-Studio-B
      - de-DE-Studio-C
      - de-DE-Neural2-B
      - de-DE-Neural2-C
      - de-DE-Neural2-D
      - de-DE-Neural2-F
      - en-US-Studio-O
      - en-US-Studio-Q
      - en-US-Neural2-A
      - en-US-Neural2-C
      - en-US-Neural2-D
      - en-US-Neural2-F
    client: false
    description: "Google Cloud TTS voice (Studio = highest quality, Neural2 = good quality)"

  tts_google_language:
    default: "de-DE"
    type: list
    choices:
      - de-DE
      - en-US
      - en-GB
      - fr-FR
      - es-ES
    client: false
    description: "Language code for Google Cloud TTS"

  # --- OpenAI TTS settings ---

  tts_openai_model:
    default: "tts-1-hd"
    type: list
    choices:
      - tts-1
      - tts-1-hd
      - gpt-4o-mini-tts
    client: false
    description: "OpenAI TTS model to use"

  tts_openai_voice:
    default: "nova"
    type: list
    choices:
      - alloy
      - ash
      - coral
      - echo
      - fable
      - nova
      - onyx
      - sage
      - shimmer
    client: false
    description: "OpenAI voice to use"

  tts_speed:
    default: "1.0"
    type: list
    choices:
      - "0.75"
      - "0.9"
      - "1.0"
      - "1.1"
      - "1.25"
      - "1.5"
    client: false
    description: "Playback speed for generated audio"

  tts_audio_format:
    default: "mp3"
    type: list
    choices:
      - mp3
      - opus
      - aac
    client: false
    description: "Audio output format"

  tts_max_post_length:
    default: 15000
    min: 1000
    max: 50000
    client: true
    description: "Maximum post character length for TTS generation"

  tts_auto_generate:
    default: true
    client: false
    description: "Automatically generate TTS audio for new posts"

  tts_auto_generate_first_post_only:
    default: false
    client: false
    description: "Only auto-generate TTS for the first post in a topic (OP)"

  tts_excluded_category_ids:
    default: ""
    client: true
    description: "Komma-getrennte Liste von Kategorie-IDs, für die kein TTS generiert wird (z.B. 4,7)"

  tts_instructions:
    default: "Speak clearly and naturally in a conversational tone. Read the text as an informative article."
    type: text
    client: false
    description: "Voice instructions (only used with gpt-4o-mini-tts model)"
